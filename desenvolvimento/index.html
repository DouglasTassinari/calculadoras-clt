  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D1117;
      --surface: #161B22;
      --surface2: #1C2128;
      --border: #30363D;
      --text: #E6EDF3;
      --text2: #8B949E;
      --text3: #484F58;
      --primary: #F97316;
      --primary-dim: rgba(249,115,22,.15);
      --green: #3FB950;
      --green-dim: rgba(63,185,80,.12);
      --red: #F85149;
      --red-dim: rgba(248,81,73,.12);
      --yellow: #D29922;
      --yellow-dim: rgba(210,153,34,.12);
      --blue: #58A6FF;
      --radius: 8px;
      --font: "Inter", system-ui, sans-serif;
      --mono: "JetBrains Mono", "Fira Mono", monospace;
    }

    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; min-height: 100vh; }

    /* ---- LOGIN ---- */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-logo {
      background: #FFFFFF;
      border-radius: 14px;
      padding: 12px 16px;
      display: inline-grid; place-items: center;
      margin: 0 auto 24px;
    }
    .login-logo img { height: 46px; width: auto; display: block; }
    .login-box h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; }
    .login-box p { font-size: .85rem; color: var(--text2); margin-bottom: 32px; }
    .login-field { margin-bottom: 16px; text-align: left; }
    .login-field label { display: block; font-size: .78rem; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
    .login-field input {
      width: 100%; padding: 10px 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: var(--mono); font-size: .9rem;
      outline: none; transition: .15s;
    }
    .login-field input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-dim); }
    .login-btn {
      width: 100%; padding: 12px;
      background: var(--primary); color: #fff;
      border: none; border-radius: var(--radius);
      font-family: var(--font); font-size: .95rem; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: .15s;
    }
    .login-btn:hover { background: #EA580C; }
    .login-error {
      margin-top: 14px; padding: 10px 14px;
      background: var(--red-dim); border: 1px solid var(--red);
      border-radius: var(--radius); color: var(--red);
      font-size: .82rem; display: none;
    }

    /* ---- DASHBOARD ---- */
    #dashboard { display: none; min-height: 100vh; flex-direction: column; }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex; align-items: center; gap: 16px;
      position: sticky; top: 0; z-index: 10;
    }
    .topbar-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: .95rem; }
    .topbar-brand .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }
    .topbar-badge { font-size: .72rem; padding: 3px 10px; border-radius: 999px; background: var(--primary-dim); color: var(--primary); font-weight: 600; }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .topbar-user { font-size: .8rem; color: var(--text2); }
    .topbar-logout { font-size: .8rem; color: var(--text2); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; cursor: pointer; color: var(--text); font-family: var(--font); transition: .15s; }
    .topbar-logout:hover { border-color: var(--red); color: var(--red); }

    .dashboard-body { flex: 1; padding: 24px; max-width: 1400px; margin: 0 auto; width: 100%; }

    .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 20px;
    }
    .stat-card .label { font-size: .72rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .stat-card .value { font-size: 2rem; font-weight: 700; font-family: var(--mono); }
    .stat-card.green .value { color: var(--green); }
    .stat-card.red .value { color: var(--red); }
    .stat-card.yellow .value { color: var(--yellow); }
    .stat-card.blue .value { color: var(--blue); }
    .stat-card.orange .value { color: var(--primary); }

    .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .run-btn {
      padding: 10px 24px; background: var(--primary); color: #fff;
      border: none; border-radius: var(--radius);
      font-family: var(--font); font-size: .9rem; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 8px; transition: .15s;
    }
    .run-btn:hover { background: #EA580C; }
    .run-btn:disabled { opacity: .5; cursor: not-allowed; }
    .filter-btn {
      padding: 8px 16px; background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text2);
      font-family: var(--font); font-size: .82rem; cursor: pointer; transition: .15s;
    }
    .filter-btn:hover, .filter-btn.active { border-color: var(--primary); color: var(--primary); background: var(--primary-dim); }
    .progress-bar { flex: 1; min-width: 200px; background: var(--surface2); border-radius: 4px; height: 6px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width .3s; border-radius: 4px; }
    .progress-label { font-size: .78rem; color: var(--text2); white-space: nowrap; }

    .test-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 12px; }
    .test-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .test-section-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      font-size: .82rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--text2);
    }
    .test-section-header .icon { font-size: 1rem; }
    .test-section-header .section-count { margin-left: auto; font-size: .72rem; padding: 2px 8px; border-radius: 999px; background: var(--surface2); color: var(--text2); }
    .test-list { list-style: none; }
    .test-item {
      padding: 9px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      font-size: .82rem; transition: background .1s;
    }
    .test-item:last-child { border-bottom: none; }
    .test-item:hover { background: var(--surface2); }
    .test-status {
      width: 18px; height: 18px; border-radius: 50%;
      display: grid; place-items: center; flex-shrink: 0; font-size: .65rem; font-weight: 700;
    }
    .test-status.idle { background: var(--border); color: var(--text3); }
    .test-status.running { background: var(--yellow-dim); color: var(--yellow); animation: spin 1s linear infinite; }
    .test-status.pass { background: var(--green-dim); color: var(--green); }
    .test-status.fail { background: var(--red-dim); color: var(--red); }
    .test-status.warn { background: var(--yellow-dim); color: var(--yellow); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .test-name { flex: 1; color: var(--text); }
    .test-detail { font-size: .72rem; color: var(--text2); font-family: var(--mono); }
    .test-time { font-size: .7rem; color: var(--text3); font-family: var(--mono); white-space: nowrap; }

    .log-panel {
      margin-top: 20px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
    }
    .log-header { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--text2); display: flex; align-items: center; gap: 8px; }
    .log-body { padding: 12px 16px; font-family: var(--mono); font-size: .76rem; color: var(--text2); max-height: 200px; overflow-y: auto; line-height: 1.8; }
    .log-body .log-ok { color: var(--green); }
    .log-body .log-err { color: var(--red); }
    .log-body .log-info { color: var(--blue); }
    .log-body .log-warn { color: var(--yellow); }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .test-grid { grid-template-columns: 1fr; }
      .dashboard-body { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- ==================== LOGIN ==================== -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <img src="/assets/img/logo-mark.png" alt="Jornada Brasil">
    </div>
    <h1>Central de Desenvolvimento</h1>
    <p>Acesso restrito — Jornada Brasil</p>
    <div class="login-field">
      <label>Usuário</label>
      <input type="text" id="inp-user" placeholder="desenvolvedor" autocomplete="username">
    </div>
    <div class="login-field">
      <label>Senha</label>
      <input type="password" id="inp-pass" placeholder="••••••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" id="login-btn">Entrar no painel</button>
    <div class="login-error" id="login-error">Usuário ou senha incorretos.</div>
  </div>
</div>

<!-- ==================== DASHBOARD ==================== -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="dot"></div>
      Jornada Brasil
    </div>
    <span class="topbar-badge">DEV PANEL</span>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-time"></span>
      <button class="topbar-logout" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="dashboard-body">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card orange">
        <div class="label">Total de Testes</div>
        <div class="value" id="stat-total">—</div>
      </div>
      <div class="stat-card green">
        <div class="label">Passou</div>
        <div class="value" id="stat-pass">—</div>
      </div>
      <div class="stat-card red">
        <div class="label">Falhou</div>
        <div class="value" id="stat-fail">—</div>
      </div>
      <div class="stat-card yellow">
        <div class="label">Avisos</div>
        <div class="value" id="stat-warn">—</div>
      </div>
      <div class="stat-card blue">
        <div class="label">Tempo médio</div>
        <div class="value" id="stat-avg">—</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="run-btn" id="run-btn" onclick="runAllTests()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Executar todos os testes
      </button>
      <button class="filter-btn active" onclick="filterTests('all', this)">Todos</button>
      <button class="filter-btn" onclick="filterTests('pass', this)">Passou</button>
      <button class="filter-btn" onclick="filterTests('fail', this)">Falhou</button>
      <button class="filter-btn" onclick="filterTests('warn', this)">Avisos</button>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <span class="progress-label" id="progress-label">Aguardando...</span>
    </div>

    <!-- Test grid -->
    <div class="test-grid" id="test-grid"></div>

    <!-- Log -->
    <div class="log-panel">
      <div class="log-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        Log de execução
      </div>
      <div class="log-body" id="log-body">Pressione "Executar todos os testes" para iniciar.</div>
    </div>

  </div>
</div>

<script>
// ==================== AUTH ====================
const CREDS = { user: 'desenvolvedor', pass: 'Acriflex2025@@!!' };

document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('inp-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('inp-user').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inp-pass').focus(); });

function doLogin() {
  const u = document.getElementById('inp-user').value.trim();
  const p = document.getElementById('inp-pass').value.trim();
  if (u === CREDS.user && p === CREDS.pass) {
    sessionStorage.setItem('jb_dev', '1');
    showDashboard();
  } else {
    const err = document.getElementById('login-error');
    err.style.display = 'block';
    document.getElementById('inp-pass').value = '';
    document.getElementById('inp-pass').focus();
    setTimeout(() => err.style.display = 'none', 3000);
  }
}

function logout() {
  sessionStorage.removeItem('jb_dev');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('inp-user').value = '';
  document.getElementById('inp-pass').value = '';
}

function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'flex';
  startClock();
  buildTestGrid();
}

if (sessionStorage.getItem('jb_dev') === '1') showDashboard();

// ==================== CLOCK ====================
function startClock() {
  const el = document.getElementById('topbar-time');
  const tick = () => { el.textContent = new Date().toLocaleTimeString('pt-BR'); };
  tick(); setInterval(tick, 1000);
}

      { id: 'blog-links', name: 'Links do blog corrigidos', type: 'dom', url: `${BASE}/blog/`, check: 'no-broken-blog-links' },
      { id: 'footer-nav', name: 'Footer links presentes', type: 'dom', url: `${BASE}/`,   check: 'footer-links' },
      { id: 'cookie-btn', name: 'Botão de cookies',      type: 'dom', url: `${BASE}/`,     check: 'cookie-banner' },
      { id: 'disclaimer', name: 'Disclaimer presente',   type: 'dom', url: `${BASE}/`,     check: 'disclaimer' },
    ]
  }
];

// ==================== BUILD GRID ====================
let allTests = {};

function buildTestGrid() {
  const grid = document.getElementById('test-grid');
  grid.innerHTML = '';
  allTests = {};
  let total = 0;

  SECTIONS.forEach(section => {
    const sec = document.createElement('div');
    sec.className = 'test-section';
    sec.id = 'sec-' + section.id;

    const header = document.createElement('div');
    header.className = 'test-section-header';
    header.innerHTML = `<span class="icon">${section.icon}</span>${section.label}<span class="section-count" id="count-${section.id}">0 / ${section.tests.length}</span>`;
    sec.appendChild(header);

    const list = document.createElement('ul');
    list.className = 'test-list';

    section.tests.forEach(t => {
      allTests[t.id] = { ...t, status: 'idle', detail: '', time: null };
      total++;

      const li = document.createElement('li');
      li.className = 'test-item';
      li.id = 'ti-' + t.id;
      li.dataset.status = 'idle';
      li.innerHTML = `
        <div class="test-status idle" id="ts-${t.id}">○</div>
        <span class="test-name">${t.name}</span>
        <span class="test-detail" id="td-${t.id}"></span>
        <span class="test-time" id="tt-${t.id}"></span>
      `;
      list.appendChild(li);
    });

    sec.appendChild(list);
    grid.appendChild(sec);
  });

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pass').textContent = '0';
  document.getElementById('stat-fail').textContent = '0';
  document.getElementById('stat-warn').textContent = '0';
  document.getElementById('stat-avg').textContent = '—';
}

// ==================== TESTS ====================
let counters = { pass: 0, fail: 0, warn: 0, done: 0 };
let times = [];

function setStatus(id, status, detail, time) {
  const ts = document.getElementById('ts-' + id);
  const td = document.getElementById('td-' + id);
  const tt = document.getElementById('tt-' + id);
  const ti = document.getElementById('ti-' + id);
  if (!ts) return;

  const icons = { running: '↻', pass: '✓', fail: '✕', warn: '⚠' };
  ts.className = 'test-status ' + status;
  ts.textContent = icons[status] || '○';
  td.textContent = detail || '';
  tt.textContent = time ? time + 'ms' : '';
  ti.dataset.status = status;
}

async function fetchTest(t) {
  setStatus(t.id, 'running', 'verificando...', null);
  const t0 = Date.now();
  try {
    const res = await fetch(t.url, { method: 'HEAD', cache: 'no-cache' });
    const elapsed = Date.now() - t0;
    if (res.ok) {
      setStatus(t.id, 'pass', `HTTP ${res.status}`, elapsed);
      return { status: 'pass', time: elapsed };
    } else if (res.status === 304) {
      setStatus(t.id, 'pass', `HTTP ${res.status} (cache)`, elapsed);
      return { status: 'pass', time: elapsed };
    } else {
      setStatus(t.id, 'fail', `HTTP ${res.status}`, elapsed);
      return { status: 'fail', time: elapsed };
    }
  } catch (e) {
    const elapsed = Date.now() - t0;
    setStatus(t.id, 'fail', 'Erro de rede', elapsed);
    return { status: 'fail', time: elapsed };
  }
}

// DOM-based tests: fetch page HTML and check its content
const domCache = {};
async function getHTML(url) {
  if (domCache[url]) return domCache[url];
  const res = await fetch(url, { cache: 'no-cache' });
  const html = await res.text();
  domCache[url] = html;
  return html;
}

async function domTest(t) {
  setStatus(t.id, 'running', 'analisando...', null);
  const t0 = Date.now();
  try {
    const html = await getHTML(t.url);
    const elapsed = Date.now() - t0;
    let pass = false, detail = '';

    switch (t.check) {
      case 'title':
        pass = html.includes(`<title`) && html.toLowerCase().includes(t.expect.toLowerCase());
        detail = pass ? `Contém "${t.expect}"` : `Não encontrou "${t.expect}"`;
        break;
      case 'meta-desc':
        pass = /<meta\s+name="description"\s+content="[^"]{30,}"/i.test(html);
        detail = pass ? 'Meta description OK' : 'Meta description ausente ou curta';
        break;
      case 'h1':
        pass = /<h1[\s>]/i.test(html);
        detail = pass ? 'H1 encontrado' : 'H1 ausente';
        break;
      case 'canonical':
        pass = /<link\s+rel="canonical"/i.test(html);
        detail = pass ? 'Canonical OK' : 'Canonical ausente';
        break;
      case 'og':
        pass = /property="og:title"/i.test(html) && /property="og:description"/i.test(html);
        detail = pass ? 'og:title + og:description OK' : 'Open Graph incompleto';
        break;
      case 'brand':
        pass = html.includes(t.expect);
        detail = pass ? `"${t.expect}" encontrado` : `"${t.expect}" não encontrado`;
        break;
      case 'link':
        pass = html.includes(`href="${t.expect}"`);
        detail = pass ? 'Link encontrado' : 'Link não encontrado';
        break;
      case 'no-broken-blog-links': {
        // Check that blog cards don't link to just /blog/ (must link to specific articles)
        const matches = [...html.matchAll(/href="([^"]*\/blog\/?)"/g)];
        const broken = matches.filter(m => /\/blog\/$/.test(m[1]) || /\/blog"/.test(m[0]));
        // Allow the nav link to /blog/ but not article links
        const articleLinks = [...html.matchAll(/class="blog-card"[\s\S]*?href="([^"]+)"/g)];
        const brokenArticles = articleLinks.filter(m => /\/blog\/$/.test(m[1]));
        pass = brokenArticles.length === 0;
        detail = pass ? 'Todos os links de artigos OK' : `${brokenArticles.length} link(s) quebrado(s)`;
        break;
      }
      case 'footer-links':
        pass = html.includes('/sobre/') && html.includes('/privacidade/') && html.includes('/termos/');
        detail = pass ? 'Links do footer presentes' : 'Links do footer incompletos';
        break;
      case 'cookie-banner':
        pass = html.includes('cookie-banner');
        detail = pass ? 'Banner de cookies OK' : 'Banner de cookies ausente';
        break;
      case 'disclaimer':
        pass = html.includes('disclaimer') || html.includes('educativo');
        detail = pass ? 'Disclaimer presente' : 'Disclaimer ausente';
        break;
      default:
        pass = true; detail = 'OK';
    }

    const status = pass ? 'pass' : 'fail';
    setStatus(t.id, status, detail, elapsed);
    return { status, time: elapsed };
  } catch (e) {
    const elapsed = Date.now() - t0;
    setStatus(t.id, 'fail', 'Erro: ' + e.message, elapsed);
    return { status: 'fail', time: elapsed };
  }
}

function log(msg, cls = '') {
  const el = document.getElementById('log-body');
  const time = new Date().toLocaleTimeString('pt-BR');
  el.innerHTML += `<span class="${cls}">[${time}] ${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

function updateStats() {
  document.getElementById('stat-pass').textContent = counters.pass;
  document.getElementById('stat-fail').textContent = counters.fail;
  document.getElementById('stat-warn').textContent = counters.warn;
  if (times.length > 0) {
    const avg = Math.round(times.reduce((a,b)=>a+b,0)/times.length);
    document.getElementById('stat-avg').textContent = avg + 'ms';
  }
  const total = Object.keys(allTests).length;
  const pct = Math.round((counters.done / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${counters.done} / ${total} (${pct}%)`;
}

function updateSectionCount(sectionId) {
  const section = SECTIONS.find(s => s.id === sectionId);
  if (!section) return;
  const done = section.tests.filter(t => {
    const el = document.getElementById('ti-' + t.id);
    return el && el.dataset.status !== 'idle' && el.dataset.status !== 'running';
  }).length;
  const el = document.getElementById('count-' + sectionId);
  if (el) el.textContent = `${done} / ${section.tests.length}`;
}

async function runAllTests() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg> Executando...';

  counters = { pass: 0, fail: 0, warn: 0, done: 0 };
  times = [];
  Object.keys(domCache).forEach(k => delete domCache[k]);

  document.getElementById('log-body').innerHTML = '';
  log('Iniciando suite de testes — Jornada Brasil', 'log-info');
  log('Base URL: ' + window.location.origin + BASE, 'log-info');

  buildTestGrid();

  const total = Object.keys(allTests).length;

  for (const section of SECTIONS) {
    log(`--- ${section.icon} ${section.label} ---`, 'log-info');
    for (const t of section.tests) {
      let result;
      if (t.type === 'dom') {
        result = await domTest(t);
      } else {
        result = await fetchTest(t);
      }

      counters.done++;
      counters[result.status] = (counters[result.status] || 0) + 1;
      if (result.time) times.push(result.time);

      const icon = result.status === 'pass' ? '✓' : result.status === 'warn' ? '⚠' : '✕';
      const cls = result.status === 'pass' ? 'log-ok' : result.status === 'warn' ? 'log-warn' : 'log-err';
      log(`${icon} ${t.name} ${result.time ? '(' + result.time + 'ms)' : ''}`, cls);

      updateStats();
      updateSectionCount(section.id);

      // Small delay to avoid hammering the server
      await new Promise(r => setTimeout(r, 80));
    }
  }

  const finalCls = counters.fail === 0 ? 'log-ok' : 'log-err';
  log(`Concluído. ✓ ${counters.pass} passou  ✕ ${counters.fail} falhou  ⚠ ${counters.warn} avisos`, finalCls);

  btn.disabled = false;
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg> Executar novamente';
}

// ==================== FILTER ====================
function filterTests(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('.test-item').forEach(item => {
    if (filter === 'all' || item.dataset.status === filter) {
      item.style.display = '';
    } else {
      item.style.display = 'none';
    }
  });
}
